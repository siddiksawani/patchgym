name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest

      - name: Validate tasks
        run: patchgym validate-tasks --tasks tasks

      - name: Smoke benchmark
        run: patchgym benchmark --agent heuristic --tasks tasks --episodes 1 --no-trajectories --seed 0
